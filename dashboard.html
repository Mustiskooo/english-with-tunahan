<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EnglishWithTunahan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
display:flex;
height:100vh;
background:#0b0f1a;
color:white;
overflow-x:hidden;
}

/* SIDEBAR */
.sidebar{
width:250px;
padding:20px;
background:rgba(255,255,255,0.03);
border-right:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
display:flex;
flex-direction:column;
justify-content:space-between;
transition:.3s;
}

.logo{
font-weight:700;
font-size:18px;
margin-bottom:20px;
background:linear-gradient(90deg,#6c5ce7,#00d2ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.class-btn{
width:100%;
padding:10px;
margin-bottom:8px;
border-radius:10px;
border:none;
cursor:pointer;
background:rgba(255,255,255,0.05);
color:white;
text-align:left;
transition:.2s;
}

.class-btn:hover{
background:rgba(108,92,231,0.25);
transform:translateX(3px);
}

.class-btn.active{
background:linear-gradient(90deg,#6c5ce7,#00d2ff);
}

.bottom-menu{
margin-top:20px;
}

.bottom-btn{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:none;
cursor:pointer;
background:rgba(255,255,255,0.05);
color:white;
text-align:left;
transition:.2s;
font-size:13px;
}

.bottom-btn:hover{
background:rgba(255,255,255,0.12);
}

/* MENU */
.menu-toggle{
display:none;
position:fixed;
top:15px;
left:15px;
z-index:1000;

background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.1);

color:white;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
backdrop-filter:blur(12px);
}

/* MAIN */
.main{
flex:1;
padding:30px;
overflow-y:auto;
}

.title{
font-size:26px;
font-weight:700;
margin-bottom:5px;
}

.subtitle{
font-size:13px;
opacity:0.6;
margin-bottom:25px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
padding:18px;
border-radius:16px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
cursor:pointer;
transition:.25s;
backdrop-filter:blur(10px);
}

.card:hover{
transform:translateY(-6px);
border-color:rgba(0,210,255,0.4);
}

.card h3{
font-size:16px;
margin-bottom:6px;
}

.card p{
font-size:12px;
opacity:0.6;
line-height:1.4;
}

/* MOBILE */
@media(max-width:768px){
.sidebar{
position:fixed;
left:-250px;
top:0;
height:100%;
z-index:999;
}

.sidebar.active{
left:0;
}

.menu-toggle{
display:block;
}

.main{
padding:15px;
width:100%;
padding-top:70px;
}
}
</style>
</head>

<body>

<!-- MENU BUTTON -->
<button class="menu-toggle" onclick="toggleMenu()">☰</button>

<!-- SIDEBAR -->
<div class="sidebar">

<div>
<div class="logo">EnglishWithTunahan</div>

<button class="class-btn active" onclick="loadClass(5)" data-class="5">Grade 5</button>
<button class="class-btn" onclick="loadClass(6)" data-class="6">Grade 6</button>
<button class="class-btn" onclick="loadClass(7)" data-class="7">Grade 7</button>
<button class="class-btn" onclick="loadClass(8)" data-class="8">Grade 8</button>
</div>

<div class="bottom-menu">
<button class="bottom-btn" onclick="location.href='user.html'">👤 Profile</button>
<button class="bottom-btn" onclick="window.open('https://quizlet.com/user/ttkomTUNAHAN/')">📚 Quizlet</button>
<button class="bottom-btn" onclick="logout()">🚪 Logout</button>
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="title" id="title">Grade 5</div>
<div class="subtitle">Select a unit to continue</div>

<div class="grid" id="grid"></div>

</div>

<script>
let currentClass = 5;

const data = {
5:{units:[
"Hello – Greetings",
"My Town – Places",
"Games and Hobbies",
"My Daily Routine",
"Health",
"Movies",
"Party Time",
"Fitness",
"Animal Shelter",
"Festivals"
]},
6:{units:[
"Life","Breakfast","Downtown","Weather","Fair",
"Occupations","Holidays","Books","Planet","Democracy"
]},
7:{units:[
"Appearance","Sports","Biographies","Animals","TV",
"Celebrations","Dreams","Buildings","Environment","Planets"
]},
8:{units:[
"Friendship","Teen Life","Kitchen","Phone","Internet",
"Adventures","Tourism","Chores","Science","Nature"
]}
};

function setActiveClass(c){
document.querySelectorAll(".class-btn").forEach(b=>{
b.classList.remove("active");
if(b.dataset.class==c) b.classList.add("active");
});
}

function loadClass(c){
currentClass=c;
document.getElementById("title").innerText="Grade "+c;

setActiveClass(c);

const grid=document.getElementById("grid");
grid.innerHTML="";

data[c].units.forEach((u,i)=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`<h3>Unit ${i+1}</h3><p>${u}</p>`;
div.onclick=()=>{
location.href=`unit.html?class=${c}&unit=${i+1}`;
};
grid.appendChild(div);
});
}

function toggleMenu(){
document.querySelector(".sidebar").classList.toggle("active");
}

function logout(){
location.href="index.html";
}

loadClass(5);
</script>

</body>
</html>

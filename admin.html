<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Paneli</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0b0f1a;
  color:white;
}

.top{
  padding:15px 20px;
  background:rgba(255,255,255,.03);
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;
  justify-content:space-between;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

.dropzone{
  margin-top:15px;
  padding:40px;
  border:2px dashed rgba(255,255,255,0.3);
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.dropzone:hover{
  border-color:#6c5ce7;
  background:rgba(108,92,231,0.1);
}

.dropzone.dragover{
  border-color:#00d2ff;
  background:rgba(0,210,255,0.1);
}

button{
  margin-top:15px;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#6c5ce7;
  color:white;
}

button:hover{
  opacity:0.9;
}

#status{
  margin-top:10px;
  opacity:0.7;
  white-space:pre-line;
}
</style>
</head>

<body>

<div class="top">
  <div>🛠 Admin Panel (Drag & Drop)</div>
  <button onclick="location.href='dashboard.html'">Dashboard</button>
</div>

<div class="container">

<div class="card">

<h2>Upload PDFs</h2>

<select id="grade">
  <option value="5">Grade 5</option>
  <option value="6">Grade 6</option>
  <option value="7">Grade 7</option>
  <option value="8">Grade 8</option>
</select>

<select id="unit">
  <option value="1">Unit 1</option>
  <option value="2">Unit 2</option>
  <option value="3">Unit 3</option>
  <option value="4">Unit 4</option>
  <option value="5">Unit 5</option>
  <option value="6">Unit 6</option>
  <option value="7">Unit 7</option>
  <option value="8">Unit 8</option>
  <option value="9">Unit 9</option>
  <option value="10">Unit 10</option>
</select>

<div id="dropzone" class="dropzone">
  📂 Drag & Drop PDF files here<br>
  or click to select
</div>

<input type="file" id="file" multiple accept="application/pdf" hidden>

<button onclick="uploadPDF()">Upload</button>

<div id="status">Waiting...</div>

</div>

</div>

<script type="module">
  import { protectPage, isAdmin } from "./app.js";

const user = await protectPage();

if (!isAdmin(user)) {
  window.location.href = "dashboard.html";
}
  
  import {
  protectPage,
  getUser,
  isAdmin
} from "./app.js";

protectPage();

const user = getUser();

if (!isAdmin(user)) {
  window.location.href = "dashboard.html";
}
  
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://ygrapjawsfjavggttiqw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlncmFwamF3c2ZqYXZnZ3R0aXF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDg3MDksImV4cCI6MjA5ODIyNDcwOX0.Y-vK8xQRz3nkVreGr-XgiIwiNeN7pWPAXlSP5RUKoZo"
);

let selectedFiles = [];

const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("file");
const status = document.getElementById("status");

dropzone.onclick = () => fileInput.click();

fileInput.onchange = (e) => {
  selectedFiles = [...e.target.files];
  status.innerText = `${selectedFiles.length} file selected`;
};

dropzone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropzone.classList.add("dragover");
});

dropzone.addEventListener("dragleave", () => {
  dropzone.classList.remove("dragover");
});

dropzone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropzone.classList.remove("dragover");

  selectedFiles = [...e.dataTransfer.files];
  status.innerText = `${selectedFiles.length} file dropped`;
});
window.uploadPDF = async function () {

  if (!selectedFiles.length) {
    status.innerText = "No files selected ❌";
    return;
  }

  const grade = document.getElementById("grade").value;
  const unit = document.getElementById("unit").value;

  const folder = `grade${grade}/unit${unit}`;

  status.innerText = "Uploading... ⏳";

  let ok = 0;

  for (let file of selectedFiles) {

    // bi bozul nasıl ratlıyorum supabasenin websitesini
    const path = `${folder}/${crypto.randomUUID()}-${file.name}`;

    const { error } = await supabase.storage
      .from("pdfs")
      .upload(path, file, { upsert: true });

    if (error) {
      console.log("UPLOAD ERROR:", error);
    } else {
      ok++;
    }
  }

  status.innerText =
    `Upload done ✔\nSuccess: ${ok}/${selectedFiles.length}`;

  selectedFiles = [];
};
</script>

</body>
</html>

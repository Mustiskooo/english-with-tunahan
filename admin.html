<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - EnglishWithTunahan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#0b0f1a;
color:white;
}

.top{
padding:15px 20px;
background:rgba(255,255,255,.03);
border-bottom:1px solid rgba(255,255,255,.08);
display:flex;
justify-content:space-between;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.08);
padding:20px;
border-radius:16px;
margin-bottom:20px;
}

input, select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
outline:none;
}

button{
margin-top:10px;
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
background:#6c5ce7;
color:white;
}

button:hover{
opacity:0.9;
}
</style>
</head>

<body>

<div class="top">
<div>🛠 Admin Panel v1.0</div>
<div><button onclick="location.href='dashboard.html'">Dashboard</button></div>
</div>

<div class="container">

<div class="card">
<h2>📚 Upload PDF</h2>

<select id="grade">
<option value="5">Grade 5</option>
<option value="6">Grade 6</option>
<option value="7">Grade 7</option>
<option value="8">Grade 8</option>
</select>

<select id="unit">
<option value="1">Unit 1</option>
<option value="2">Unit 2</option>
<option value="3">Unit 3</option>
<option value="4">Unit 4</option>
<option value="5">Unit 5</option>
<option value="6">Unit 6</option>
<option value="7">Unit 7</option>
<option value="8">Unit 8</option>
<option value="9">Unit 9</option>
<option value="10">Unit 10</option>
</select>

<input type="file" id="file" accept="application/pdf">

<button onclick="uploadPDF()">Upload</button>

</div>

<div class="card">
<h2>📦 Status</h2>
<div id="status">Waiting...</div>
</div>

</div>

<script type="module">
import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

/* Firebase config */
const firebaseConfig = {
  apiKey: "AIzaSyD52vq0pHWiWP3CxFZB8TpzlwcTDStDM6M",
  authDomain: "englishwithtunahan.firebaseapp.com",
  projectId: "englishwithtunahan",
  storageBucket: "englishwithtunahan.appspot.com",
  appId: "1:204561726917:web:2312ea68afce1c529d5fac"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);

window.uploadPDF = async function(){

const file = document.getElementById("file").files[0];
const grade = document.getElementById("grade").value;
const unit = document.getElementById("unit").value;

if(!file){
document.getElementById("status").innerText = "No file selected";
return;
}

const path = `pdfs/grade${grade}/unit${unit}.pdf`;

const storageRef = ref(storage, path);

document.getElementById("status").innerText = "Uploading...";

await uploadBytes(storageRef, file);

const url = await getDownloadURL(storageRef);

document.getElementById("status").innerText = "Uploaded: " + url;

console.log(url);
};

</script>

</body>
</html>

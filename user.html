<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>EnglishWithTunahan</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  display:flex;
  min-height:100vh;
  background:#0b0f1a;
  color:white;
  overflow-x:hidden;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  padding:20px;
  background:rgba(255,255,255,0.03);
  border-right:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:0.3s;
}

.logo{
  font-weight:700;
  font-size:18px;
  margin-bottom:20px;
  background:linear-gradient(90deg,#6c5ce7,#00d2ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.class-btn,.bottom-btn{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background:rgba(255,255,255,0.05);
  color:white;
  text-align:left;
  transition:0.2s;
}

.class-btn:hover,.bottom-btn:hover{
  background:rgba(108,92,231,0.25);
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:320px;
  max-width:90%;
  padding:25px;
  border-radius:16px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  text-align:center;
}

.avatar{
  width:90px;
  height:90px;
  border-radius:50%;
  margin-bottom:15px;
}

.name{font-size:20px;font-weight:700;}
.email{font-size:13px;opacity:0.6;margin-top:5px;}

.btn{
  margin-top:20px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:linear-gradient(90deg,#6c5ce7,#00d2ff);
  color:white;
  font-weight:600;
}

/* MOBILE */
@media (max-width:768px){
  .sidebar{
    position:fixed;
    left:-260px;
    top:0;
    height:100%;
    z-index:999;
  }

  .sidebar.active{left:0;}
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">

  <div>
    <div class="logo">EnglishWithTunahan</div>

    <button class="class-btn">Grade 5</button>
    <button class="class-btn">Grade 6</button>
    <button class="class-btn">Grade 7</button>
    <button class="class-btn">Grade 8</button>
  </div>

  <div>
    <a href="user.html">
      <button class="bottom-btn">👤 Profile</button>
    </a>

    <a href="https://quizlet.com" target="_blank">
      <button class="bottom-btn">📚 Quizlet</button>
    </a>

    <button class="bottom-btn" onclick="logout()">🚪 Logout</button>
  </div>

</div>

<div class="main">
  <div class="card">
    <img id="avatar" class="avatar">
    <div class="name" id="name"></div>
    <div class="email" id="email"></div>
    <button class="btn" onclick="logout()">Logout</button>
  </div>
</div>

<script>
/* =========================
   USER SYSTEM
========================= */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "index.html";
}

document.getElementById("name").innerText = user.name || "User";
document.getElementById("email").innerText = user.email || "";
document.getElementById("avatar").src =
  user.photo || "https://ui-avatars.com/api/?name=User";

/* =========================
   SIDEBAR (mobile safe)
========================= */
const sidebar = document.getElementById("sidebar");

function toggleMenu(){
  sidebar.classList.toggle("active");
}

window.toggleMenu = toggleMenu;

/* =========================
   LOGOUT
========================= */
function logout(){
  localStorage.clear();
  window.location.href = "index.html";
}

window.logout = logout;
</script>

</body>
</html>

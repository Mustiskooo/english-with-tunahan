<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EnglishWithTunahan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:#0b0f1a;
color:#fff;
overflow-x:hidden;
}

/* TOP BAR */
.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(255,255,255,0.03);
border-bottom:1px solid rgba(255,255,255,0.08);
position:sticky;
top:0;
backdrop-filter:blur(10px);
}

.back{
padding:6px 10px;
border-radius:8px;
background:rgba(255,255,255,0.05);
cursor:pointer;
transition:.2s;
}
.back:hover{
background:rgba(108,92,231,0.25);
}

/* MAIN */
.container{
max-width:800px;
margin:0 auto;
padding:25px;
}

.card{
padding:25px;
border-radius:14px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

h2{
margin-bottom:10px;
}

p{
opacity:.75;
line-height:1.6;
font-size:15px;
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
margin-top:20px;
gap:10px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:rgba(255,255,255,0.05);
color:white;
transition:.2s;
}

.btn:hover{
background:rgba(108,92,231,0.25);
}

/* MOBILE */
@media(max-width:768px){
.container{
padding:15px;
}

.card{
padding:18px;
}

p{
font-size:14px;
}
}
</style>
</head>

<body>

  <div style="padding:20px">
  <iframe id="pdfFrame"
    style="width:100%;height:80vh;border:none;border-radius:12px;background:white;">
  </iframe>

  <div id="status" style="opacity:.6;margin-top:10px;"></div>
</div>

<div class="top">
<div class="back" onclick="goBack()">← Dashboard</div>
<div id="title">Unit</div>
<div></div>
</div>

<div class="container">

<div class="card">
<h2 id="unitTitle"></h2>
<p id="desc"></p>

<div class="nav">
<button class="btn" onclick="prevUnit()">← Prev</button>
<button class="btn" onclick="nextUnit()">Next →</button>
</div>

</div>

</div>

<script>

const data = {
5:["Greetings","My Town","Games and Hobbies","My Daily Routine","Health","Movies","Party Time","Fitness","Animal Shelter","Festivals"],
6:["Life","Yummy Breakfast","Downtown","Weather and Emotions","At the Fair","Occupations","Holidays","Bookworms","Saving the Planet","Democracy"],
7:["Appearance and Personality","Sports","Biographies","Wild Animals","Television","Celebrations","Dreams","Public Buildings","Environment","Planets"],
8:["Friendship","Teen Life","In the Kitchen","On the Phone","The Internet","Adventures","Tourism","Chores","Science","Natural Forces"]
};

const params = new URLSearchParams(location.search);
const cls = Number(params.get("class")) || 5;
let unit = Number(params.get("unit")) || 1;

function render(){

const arr = data[cls];

if(unit < 1) unit = 1;
if(unit > arr.length) unit = arr.length;

document.getElementById("title").innerText = `Grade ${cls} - Unit ${unit}`;
document.getElementById("unitTitle").innerText = `Unit ${unit}`;
document.getElementById("desc").innerText = arr[unit-1];

}

function goBack(){
window.location.href="dashboard.html";
}

function nextUnit(){
if(unit < data[cls].length){
unit++;
updateURL();
}
}

function prevUnit(){
if(unit > 1){
unit--;
updateURL();
}
}

function updateURL(){
window.location.href = `unit.html?class=${cls}&unit=${unit}`;
}

render();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Inter,sans-serif;
    background:#0b0f1a;
    color:white;
}

.top{
    padding:18px 28px;
    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(255,255,255,.03);
    border-bottom:1px solid rgba(255,255,255,.08);
}

.top h2{
    margin:0;
}

.top p{
    margin:4px 0 0;
    color:#94a3b8;
}

.back{
    display:inline-flex;
    align-items:center;
    justify-content:center;

    padding:11px 18px;

    border-radius:12px;

    background:#6c5ce7;

    color:white;
    text-decoration:none;
    font-weight:600;

    transition:.2s;
}

.back:hover{
    transform:translateY(-2px);
}

.container{
    height:calc(100vh - 77px);
    overflow-y:auto;
    padding:30px;
}

.pdf-grid{
    display:grid;
    gap:20px;
    max-width:900px;
    margin:auto;
}

.item{
    background:rgba(255,255,255,.04);

    border:1px solid rgba(255,255,255,.08);

    border-radius:18px;

    padding:22px;

    transition:.25s;

    text-align:center;
}

.item:hover{
    border-color:#6c5ce7;
    background:rgba(108,92,231,.15);
    transform:translateY(-3px);
}
</style>
</head>

<body>

<div class="top">

    <div>
        <h2 id="title">Unit</h2>
        <p>Study materials</p>
    </div>

    <a href="dashboard.html" class="back">
        ← Dashboard
    </a>

</div>

<div class="container">

    <div id="pdfList" class="pdf-grid">
        <!-- JS buraya item ekleyecek -->
    </div>

</div>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

/* supabase connect */
const supabase = createClient(
  "https://ygrapjawsfjavggttiqw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlncmFwamF3c2ZqYXZnZ3R0aXF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDg3MDksImV4cCI6MjA5ODIyNDcwOX0.Y-vK8xQRz3nkVreGr-XgiIwiNeN7pWPAXlSP5RUKoZo"
);

/* constparamclsunit yaz işte sorgulama */
const params = new URLSearchParams(location.search);
const cls = Number(params.get("class")) || 5;
const unit = Number(params.get("unit")) || 1;

document.getElementById("title").innerText =
  `Grade ${cls} - Unit ${unit}`;

/* load files */
const folder = `grade${cls}/unit${unit}`;

const listEl = document.getElementById("pdfList");

function formatFileName(fileName) {
  return fileName
    .replace(/\.[^/.]+$/, "")      // .pdf kaldır
    .replace(/^\d+[-_ ]*/, "")     // 01-, 02_ vb. kaldır
    .replace(/[-_]+/g, " ")        // - ve _ -> boşluk
    .replace(/\b\w/g, c => c.toUpperCase()); // İlk harfleri büyüt
}

async function loadPDFs() {

  const { data, error } = await supabase.storage
    .from("pdfs")
    .list(folder);

  if (error) {
    listEl.innerHTML = "Error loading files";
    return;
  }

  data.sort((a, b) =>
    a.name.localeCompare(b.name, undefined, { numeric: true })
  );

  listEl.innerHTML = "";

  data.forEach(file => {

    const { data: url } = supabase.storage
      .from("pdfs")
      .getPublicUrl(`${folder}/${file.name}`);

    const div = document.createElement("div");
    div.className = "item";

    div.innerText = "📄 " + formatFileName(file.name);

    div.onclick = () => {
      window.open(url.publicUrl, "_blank");
    };

    listEl.appendChild(div);

  });

}

loadPDFs();
</script>

</body>
</html>

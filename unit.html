<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EnglishWithTunahan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:#0b0f1a;
color:#fff;
}

/* TOP */
.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(255,255,255,0.03);
border-bottom:1px solid rgba(255,255,255,0.08);
position:sticky;
top:0;
backdrop-filter:blur(10px);
}

.back{
padding:6px 10px;
border-radius:8px;
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.back:hover{
background:rgba(108,92,231,0.25);
}

/* MAIN */
.container{
max-width:800px;
margin:0 auto;
padding:25px;
}

.card{
padding:25px;
border-radius:14px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
}

h2{
margin-bottom:10px;
}

p{
opacity:.75;
line-height:1.6;
font-size:15px;
}

/* BUTTONS */
.nav{
display:flex;
gap:10px;
margin-top:15px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:rgba(255,255,255,0.05);
color:white;
}

.btn:hover{
background:rgba(108,92,231,0.25);
}

/* PDF */
iframe{
width:100%;
height:70vh;
margin-top:20px;
border:none;
border-radius:12px;
background:white;
}

#status{
margin-top:10px;
opacity:.6;
}
</style>
</head>

<body>

<div class="top">
  <div class="back" onclick="goBack()">← Dashboard</div>
  <div id="title">Unit</div>
  <div></div>
</div>

<div class="container">

  <div class="card">
    <h2 id="unitTitle"></h2>
    <p id="desc"></p>

    <div class="nav">
      <button class="btn" onclick="prevUnit()">← Unit</button>
      <button class="btn" onclick="nextUnit()">Unit →</button>
    </div>

    <div class="nav">
      <button class="btn" onclick="prevPDF()">← PDF</button>
      <button class="btn" onclick="nextPDF()">PDF →</button>
    </div>
  </div>

  <iframe id="pdfFrame"></iframe>

  <div id="status"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getStorage, ref, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyD52vq0pHWiWP3CxFZB8TpzlwcTDStDM6M",
  authDomain: "englishwithtunahan.firebaseapp.com",
  projectId: "englishwithtunahan",
  storageBucket: "englishwithtunahan.appspot.com",
  appId: "1:204561726917:web:2312ea68afce1c529d5fac"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);

/* DATA */
const data = {
5:["Greetings","My Town","Games and Hobbies","My Daily Routine","Health","Movies","Party Time","Fitness","Animal Shelter","Festivals"],
6:["Life","Yummy Breakfast","Downtown","Weather and Emotions","At the Fair","Occupations","Holidays","Bookworms","Saving the Planet","Democracy"],
7:["Appearance and Personality","Sports","Biographies","Wild Animals","Television","Celebrations","Dreams","Public Buildings","Environment","Planets"],
8:["Friendship","Teen Life","In the Kitchen","On the Phone","The Internet","Adventures","Tourism","Chores","Science","Natural Forces"]
};

/* PARAMS */
const params = new URLSearchParams(location.search);
const cls = Number(params.get("class")) || 5;
let unit = Number(params.get("unit")) || 1;

/* PDF STATE */
let pdfIndex = 1;
let pdfCount = 3; // şimdilik sabit

function clamp(){
  const max = data[cls].length;
  if(unit < 1) unit = 1;
  if(unit > max) unit = max;
}

/* TEXT */
function render(){
  clamp();
  document.getElementById("title").innerText = `Grade ${cls} - Unit ${unit}`;
  document.getElementById("unitTitle").innerText = `Unit ${unit}`;
  document.getElementById("desc").innerText = data[cls][unit-1];
}

/* PDF LOAD */
async function loadPDF(){
  try{
    const path = `pdfs/grade${cls}/unit${unit}/${pdfIndex}.pdf`;
    const pdfRef = ref(storage, path);
    const url = await getDownloadURL(pdfRef);

    document.getElementById("pdfFrame").src = url;
    document.getElementById("status").innerText = `PDF ${pdfIndex}/${pdfCount}`;
  }
  catch(e){
    document.getElementById("pdfFrame").src = "";
    document.getElementById("status").innerText = "No PDF found ❌";
  }
}

/* UNIT NAV */
window.nextUnit = function(){
  if(unit < data[cls].length){
    unit++;
    pdfIndex = 1;
    location.href = `unit.html?class=${cls}&unit=${unit}`;
  }
}

window.prevUnit = function(){
  if(unit > 1){
    unit--;
    pdfIndex = 1;
    location.href = `unit.html?class=${cls}&unit=${unit}`;
  }
}

/* PDF NAV */
window.nextPDF = function(){
  if(pdfIndex < pdfCount){
    pdfIndex++;
    loadPDF();
  }
}

window.prevPDF = function(){
  if(pdfIndex > 1){
    pdfIndex--;
    loadPDF();
  }
}

window.goBack = function(){
  location.href = "dashboard.html";
}

/* INIT */
render();
loadPDF();
</script>

</body>
</html>

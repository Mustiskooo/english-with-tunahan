<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0b0f1a;
  color:white;
  overflow:hidden;
}

.top{
  padding:15px;
  background:rgba(255,255,255,0.03);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.container{
  display:flex;
  height:calc(100vh - 60px);
}

.list{
  width:260px;
  background:rgba(255,255,255,0.03);
  border-right:1px solid rgba(255,255,255,0.08);
  overflow-y:auto;
}

.item{
  padding:12px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.05);
  transition:0.2s;
}

.item:hover{
  background:rgba(108,92,231,0.2);
}

.viewer{
  flex:1;
  background:white;
}
iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<div class="top">
  <div>
    <h2 id="title">Unit</h2>
    <p>Study materials</p>
  </div>
<a href="dashboard.html">
  <button class="back" onclick="history.back()">
    ← Dashboard
  </button>
</div>
</a>

<div class="container">

  <div class="pdf-grid" id="pdfList">
    <!-- Supabase'den gelen PDF kartları buraya otomatik eklenecek -->
  </div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

/* supabase connect */
const supabase = createClient(
  "https://ygrapjawsfjavggttiqw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlncmFwamF3c2ZqYXZnZ3R0aXF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDg3MDksImV4cCI6MjA5ODIyNDcwOX0.Y-vK8xQRz3nkVreGr-XgiIwiNeN7pWPAXlSP5RUKoZo"
);

/* constparamclsunit yaz işte sorgulama */
const params = new URLSearchParams(location.search);
const cls = Number(params.get("class")) || 5;
const unit = Number(params.get("unit")) || 1;

document.getElementById("title").innerText =
  `Grade ${cls} - Unit ${unit}`;

/* load files */
const folder = `grade${cls}/unit${unit}`;

const listEl = document.getElementById("pdfList");
const frame = document.getElementById("pdfFrame");

async function loadPDFs(){

  const { data, error } = await supabase.storage
    .from("pdfs")
    .list(folder);

  if(error){
    listEl.innerHTML = "Error loading files";
    return;
  }

  listEl.innerHTML = "";

  data.forEach(file => {

    const { data: url } = supabase.storage
      .from("pdfs")
      .getPublicUrl(`${folder}/${file.name}`);

    const div = document.createElement("div");
    div.className = "item";
    div.innerText = "📄 " + file.name;

    div.onclick = () => {
      frame.src = url.publicUrl;
    };

    listEl.appendChild(div);
  });

}

loadPDFs();
</script>

</body>
</html>

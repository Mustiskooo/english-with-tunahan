<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{background:#0b0f1a;color:#fff}

/* top */
.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(255,255,255,0.03);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.back{
padding:6px 10px;
border-radius:8px;
background:rgba(255,255,255,0.05);
cursor:pointer;
}

/* layout */
.container{
display:grid;
grid-template-columns:1fr 250px;
gap:15px;
padding:20px;
}

.box{
padding:16px;
border-radius:12px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
}

.item{
padding:10px;
margin-bottom:8px;
border-radius:8px;
background:rgba(255,255,255,0.05);
cursor:pointer;
}
.item:hover{background:rgba(108,92,231,0.25)}
</style>
</head>

<body>

<div class="top">
<div class="back" onclick="goBack()">← Back</div>
<div id="title">Unit</div>
<div></div>
</div>

<div class="container">

<div class="box">
<h2 id="unitTitle"></h2>
<p id="desc"></p>
</div>

<div class="box">
<div id="list"></div>
</div>

</div>

<script>

const data = {
5:["Greetings","Family","Daily routine","Numbers","School","Reading","Questions","Listening","Speaking","Revision"],
6:["Past tense","Irregular verbs","Hobbies","Comparatives","Food","Descriptions","Travel","Modals","Reading","Exam"],
7:["Present perfect","Experiences","Conditionals","Passive","Tech","Environment","Jobs","Reported speech","Reading","Exam"],
8:["Grammar","Tenses","Vocabulary","Essay","Reading","Listening","Speaking","Phrasal verbs","Errors","Final"]
};

const params = new URLSearchParams(location.search);
const cls = Number(params.get("class")) || 5;
let unit = Number(params.get("unit")) || 1;

function render(){

const arr = data[cls];

document.getElementById("title").innerText = `Grade ${cls} - Unit ${unit}`;
document.getElementById("unitTitle").innerText = `Unit ${unit}`;
document.getElementById("desc").innerText = arr[unit-1];

const list = document.getElementById("list");
list.innerHTML="";

arr.forEach((u,i)=>{
const div=document.createElement("div");
div.className="item";
div.innerText="Unit "+(i+1);

div.onclick=()=>{
window.location.href=`unit.html?class=${cls}&unit=${i+1}`;
};

list.appendChild(div);
});

}

function goBack(){
window.location.href="dashboard.html";
}

render();

</script>

</body>
</html>
